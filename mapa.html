<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Desert Storm</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: #14100c;
    color: #fff;
    padding: 12px;
  }
  h1 {
    text-align: center;
    font-size: 19px;
    margin: 0 0 2px 0;
    color: #ffcc33;
  }
  p.sub {
    text-align: center;
    color: #999;
    font-size: 12px;
    margin: 0 0 14px 0;
  }

  /* List form */
  .list-box {
    max-width: 900px;
    margin: 0 auto 16px auto;
    background: #1f1a14;
    border-radius: 12px;
    padding: 14px 16px;
  }
  .list-box h2 {
    font-size: 14px;
    margin: 0 0 10px 0;
    color: #ffe37a;
  }
  .row {
    padding: 9px 0;
    border-bottom: 1px solid #2a2419;
  }
  .row:last-child { border-bottom: none; }
  .row .name {
    font-size: 13px;
    font-weight: bold;
    color: #ccc;
    margin-bottom: 6px;
  }
  .row .fields {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .field {
    flex: 1;
    min-width: 120px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .field .tag {
    font-size: 10px;
    font-weight: bold;
    color: #ffcc33;
    width: 30px;
    flex-shrink: 0;
  }
  .field.cs .tag { color: #4ade80; }
  .row input {
    flex: 1;
    padding: 7px 8px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #14100c;
    color: #fff;
    font-size: 12px;
    min-width: 0;
  }
  .row input:not(:placeholder-shown) {
    border-color: #4ade80;
  }

  /* Extra sections */
  .extra-box {
    max-width: 900px;
    margin: 0 auto 16px auto;
    background: #1f1a14;
    border-radius: 12px;
    padding: 14px 16px;
  }
  .extra-box h2 {
    font-size: 14px;
    margin: 0 0 8px 0;
    color: #ffe37a;
  }
  .extra-box textarea {
    width: 100%;
    min-height: 60px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #14100c;
    color: #fff;
    font-size: 12px;
    resize: vertical;
    font-family: inherit;
  }

  /* Map */
  .map-scroll {
    max-width: 900px;
    margin: 0 auto;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border-radius: 12px;
  }
  .map-wrap {
    position: relative;
    width: 100%;
    min-width: 720px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    aspect-ratio: 1634 / 962;
  }
  .map-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }
  #slotsContainer {
    position: absolute;
    inset: 0;
  }
  .slot-text {
    position: absolute;
    transform: translate(-50%, -50%);
    width: 8.6%;
    font-size: 8px;
    font-weight: 700;
    text-align: center;
    line-height: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    pointer-events: none;
  }
  .slot-text.cl { color: #8a5600; }
  .slot-text.cs { color: #1f6b3a; }

  .controls {
    max-width: 900px;
    margin: 20px auto 0 auto;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button.main-btn {
    background: #ffcc33;
    color: #1a1a1a;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
  }
  button.secondary {
    background: transparent;
    border: 2px solid #666;
    color: #ddd;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }
  #status {
    text-align: center;
    color: #4ade80;
    font-size: 12px;
    margin-top: 8px;
    height: 16px;
  }
</style>
</head>
<body>

<h1>🗺️ Mapa Desert Storm</h1>
<p class="sub">Preencha a lista — os nomes aparecem no mapa automaticamente</p>

<div class="list-box">

  <div id="listRows"></div>
</div>

<div class="extra-box">

  <textarea id="hunters" placeholder="Ex: Min. 00:00-10:00: Burn everything.&#10;Min. +10:00: Capturar o Silo Nuclear.&#10;CL: ..., CL: ..., CS: ..., CS: ..."></textarea>
</div>

<div class="extra-box">
  <h2>🔁 Substitutos / Reservas</h2>
  <textarea id="reservas" placeholder="Nomes dos jogadores reserva e observações"></textarea>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const STORAGE_KEY = 'desert-storm-map-slots-v2';
const IMG_W = 1634, IMG_H = 962;

// building -> label, cl count, cs count, and pixel coords for the overlay text (matches the white boxes in the image)
const SPOTS = {
  'info-center': { label: 'Info Center',  cl: 1, cs: 1, boxes: [[564,248,'cl',0],[564,286,'cs',0]] },
  'arsenal':     { label: 'Arsenal',      cl: 1, cs: 1, boxes: [[822,278,'cl',0],[822,316,'cs',0]] },
  'hospital-4':  { label: 'Hospital 4',   cl: 1, cs: 1, boxes: [[1066,238,'cl',0],[1066,276,'cs',0]] },
  'oil-1':       { label: 'Oil/Petrol 1', cl: 1, cs: 1, boxes: [[339,368,'cl',0],[339,406,'cs',0]] },
  'hospital-2':  { label: 'Hospital 2',   cl: 1, cs: 1, boxes: [[1296,390,'cl',0],[1296,428,'cs',0]] },
  'silo':        { label: 'Silo',         cl: 2, cs: 2, boxes: [[750,547,'cl',0],[876,547,'cl',1],[750,583,'cs',0],[876,583,'cs',1]] },
  'hospital-1':  { label: 'Hospital 1',   cl: 1, cs: 1, boxes: [[400,640,'cl',0],[400,678,'cs',0]] },
  'hospital-3':  { label: 'Hospital 3',   cl: 1, cs: 1, boxes: [[526,852,'cl',0],[526,890,'cs',0]] },
  'mercenary':   { label: 'Mercenary',    cl: 1, cs: 1, boxes: [[759,868,'cl',0],[759,906,'cs',0]] },
  'tech-center': { label: 'Tech Center',  cl: 1, cs: 1, boxes: [[1003,855,'cl',0],[1002,893,'cs',0]] },
  'oil-2':       { label: 'Oil/Petrol 2', cl: 1, cs: 1, boxes: [[1183,662,'cl',0],[1183,698,'cs',0]] }
};

// ---------- build the input list ----------
const listRowsEl = document.getElementById('listRows');

Object.entries(SPOTS).forEach(([id, cfg]) => {
  const row = document.createElement('div');
  row.className = 'row';

  let fieldsHtml = '';
  for (let i = 0; i < cfg.cl; i++) {
    const suffix = cfg.cl > 1 ? (i + 1) : '';
    fieldsHtml += `
      <div class="field cl">
        <span class="tag">CL${suffix}</span>
        <input type="text" placeholder="Nome" id="input-${id}-cl${i}" oninput="updateOverlay('${id}'); salvar(true);">
      </div>`;
  }
  for (let i = 0; i < cfg.cs; i++) {
    const suffix = cfg.cs > 1 ? (i + 1) : '';
    fieldsHtml += `
      <div class="field cs">
        <span class="tag">CS${suffix}</span>
        <input type="text" placeholder="Nome" id="input-${id}-cs${i}" oninput="updateOverlay('${id}'); salvar(true);">
      </div>`;
  }

  row.innerHTML = `
    <div class="name">${cfg.label}</div>
    <div class="fields">${fieldsHtml}</div>
  `;
  listRowsEl.appendChild(row);
});

// ---------- build the overlay text elements on the map ----------
const overlayContainer = document.getElementById('slotsContainer');
const overlayEls = {}; // key -> element

Object.entries(SPOTS).forEach(([buildingId, cfg]) => {
  cfg.boxes.forEach(([px, py, role, idx]) => {
    const key = `${buildingId}-${role}${idx}`;
    const el = document.createElement('div');
    el.className = 'slot-text ' + role;
    el.style.left = (px / IMG_W * 100) + '%';
    el.style.top = (py / IMG_H * 100) + '%';
    overlayContainer.appendChild(el);
    overlayEls[key] = el;
  });
});

function updateOverlay(id) {
  const cfg = SPOTS[id];
  for (let i = 0; i < cfg.cl; i++) {
    const key = `${id}-cl${i}`;
    const v = document.getElementById(`input-${key}`).value.trim();
    overlayEls[key].textContent = v;
  }
  for (let i = 0; i < cfg.cs; i++) {
    const key = `${id}-cs${i}`;
    const v = document.getElementById(`input-${key}`).value.trim();
    overlayEls[key].textContent = v;
  }
}

function setStatus(msg, ok=true) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = ok ? '#4ade80' : '#f87171';
  setTimeout(() => { el.textContent=''; }, 2000);
}

async function carregar() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      Object.entries(SPOTS).forEach(([id, cfg]) => {
        for (let i = 0; i < cfg.cl; i++) {
          const key = `${id}-cl${i}`;
          if (data[key]) document.getElementById(`input-${key}`).value = data[key];
        }
        for (let i = 0; i < cfg.cs; i++) {
          const key = `${id}-cs${i}`;
          if (data[key]) document.getElementById(`input-${key}`).value = data[key];
        }
        updateOverlay(id);
      });
      if (data.hunters) document.getElementById('hunters').value = data.hunters;
      if (data.reservas) document.getElementById('reservas').value = data.reservas;
    }
  } catch (e) {
    console.log('Nenhum dado salvo ainda.');
  }
}

function salvar(silent) {
  const data = {};
  Object.entries(SPOTS).forEach(([id, cfg]) => {
    for (let i = 0; i < cfg.cl; i++) {
      const key = `${id}-cl${i}`;
      data[key] = document.getElementById(`input-${key}`).value.trim();
    }
    for (let i = 0; i < cfg.cs; i++) {
      const key = `${id}-cs${i}`;
      data[key] = document.getElementById(`input-${key}`).value.trim();
    }
  });
  data.hunters = document.getElementById('hunters').value.trim();
  data.reservas = document.getElementById('reservas').value.trim();

  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    if (!silent) setStatus('✅ Salvo com sucesso!');
  } catch (e) {
    if (!silent) setStatus('⚠️ Erro ao salvar.', false);
  }
}

function limpar() {
  if (confirm('Tem certeza que quer limpar tudo?')) {
    Object.entries(SPOTS).forEach(([id, cfg]) => {
      for (let i = 0; i < cfg.cl; i++) document.getElementById(`input-${id}-cl${i}`).value = '';
      for (let i = 0; i < cfg.cs; i++) document.getElementById(`input-${id}-cs${i}`).value = '';
      updateOverlay(id);
    });
    document.getElementById('hunters').value = '';
    document.getElementById('reservas').value = '';
    salvar();
  }
}

async function gerarImagem() {
  setStatus('⏳ Gerando imagem...');
  try {
    const mapEl = document.querySelector('.map-wrap');
    const canvas = await html2canvas(mapEl, {
      backgroundColor: '#14100c',
      scale: 2,
      useCORS: true
    });
    canvas.toBlob(function(blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'mapa-desert-storm.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setStatus('✅ Imagem gerada! Confira seus downloads.');
    }, 'image/png');
  } catch (e) {
    console.error(e);
    setStatus('⚠️ Erro ao gerar imagem.', false);
  }
}

carregar();
</script>

</body>
</html>
